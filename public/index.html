<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareCompass · Apple Pay</title>
  <!-- Custom Checkout SDK (razorpay.js) — NOT the Standard Checkout checkout.js -->
  <script src="https://checkout.razorpay.com/v1/razorpay.js"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0c0f; color: #e9eaee;
    }
    main { width: min(440px, 92vw); padding: 32px; background: #15171c;
           border: 1px solid #23262e; border-radius: 18px; text-align: center; }
    h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em; }
    .sub { margin: 0 0 20px; color: #8b909b; font-size: 14px; }
    .amount { font-size: 34px; font-weight: 700; margin: 8px 0 22px; }
    #apple-pay-container { min-height: 48px; display: flex; justify-content: center; }
    .status { margin-top: 18px; font-size: 14px; color: #aeb3bd; }
    .status b { color: #e9eaee; }
    pre#log { margin-top: 14px; padding: 10px; background: #0b0c0f; border-radius: 10px;
              font-size: 11px; color: #6b7080; text-align: left; white-space: pre-wrap;
              max-height: 140px; overflow: auto; }
    pre#log:empty { display: none; }
    .ok { color: #5ad17f; } .err { color: #ff6b6b; }
  </style>
</head>
<body>
  <main>
    <h1>CareCompass</h1>
    <p class="sub">Apple Pay express checkout (test)</p>
    <p class="amount" id="amount">—</p>
    <div id="apple-pay-container"></div>
    <p class="status" id="status">Setting up…</p>
    <pre id="log"></pre>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const log = (m) => { $('log').textContent += m + '\n'; };
    const setStatus = (html, cls) => { $('status').innerHTML = html; $('status').className = 'status ' + (cls || ''); };

    async function init() {
      // 1) Ask our server for a USD order (Apple Pay only shows for non-INR).
      let order;
      try {
        order = await fetch('/create-order', { method: 'POST' }).then((r) => r.json());
      } catch {
        return setStatus('Could not reach the server.', 'err');
      }
      if (!order || order.error || !order.id) {
        return setStatus('Order creation failed — is the server set up with <b>live</b> Razorpay keys?', 'err');
      }
      $('amount').textContent = (order.amount / 100).toLocaleString(undefined, {
        style: 'currency', currency: order.currency,
      });

      // 2) Initialise Custom Checkout. Passing contact/email here means the
      //    customer is NEVER shown a contact form — straight to the Apple Pay sheet.
      const razorpay = new Razorpay({
        key: order.key_id,
        order_id: order.id,
        contact: '9123456789',          // TODO: use the signed-in user's details in production
        email: 'buyer@example.com',
        handler: () => {},
      });

      // 3) Only render Apple Pay if this device/browser/card can actually use it.
      let available = false, reason = '';
      try {
        ({ available, reason } = await razorpay.canMakePayment({ method: 'card', app: { name: 'apple_pay' } }));
      } catch (e) { reason = e?.message || String(e); }

      if (!available) {
        setStatus(
          '❌ Apple Pay isn’t available here.<br>Open in <b>Safari</b> on an <b>Apple device</b> ' +
          'signed into iCloud, with a <b>non-Indian card</b> in Apple Wallet.', 'err');
        log('canMakePayment → not available. reason: ' + reason);
        return;
      }

      // 4) Render the real Apple Pay button on THIS page.
      setStatus('✅ Apple Pay available — tap to pay.', 'ok');
      razorpay.mount({
        method: 'card',
        app: { name: 'apple_pay' },
        container: $('apple-pay-container'),
        theme: { buttonTheme: 'dark' },
      });

      // 5) On success, verify the signature server-side before fulfilling.
      razorpay.on('payment.success', async (resp) => {
        setStatus('⏳ Verifying payment…');
        const v = await fetch('/verify-payment', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(resp),
        }).then((r) => r.json()).catch(() => ({ verified: false }));
        setStatus(v.verified ? '🎉 Payment verified!' : '⚠️ Captured, but signature check failed.', v.verified ? 'ok' : 'err');
        log('payment_id: ' + resp.razorpay_payment_id);
      });

      razorpay.on('payment.error', (e) => {
        setStatus('⚠️ Payment error — see log.', 'err');
        log('error: ' + JSON.stringify(e?.error || e));
      });
    }

    init();
  </script>
</body>
</html>
